version: '3.8'

services:
  # container para o postgres
  postgres:
    image: postgres:15-alpine
    container_name: clockwork-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clockwork_user
      POSTGRES_PASSWORD: clockwork_pass
      POSTGRES_DB: clockwork_db
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clockwork-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clockwork_user -d clockwork_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # container para o backend (Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clockwork-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: clockwork_user
      DB_PASSWORD: clockwork_pass
      DB_NAME: clockwork_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 24h
      TZ: America/Sao_Paulo
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_logs:/app/logs
    networks:
      - clockwork-network
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  # container para o frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clockwork-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
      NODE_ENV: development
      TZ: America/Sao_Paulo
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - clockwork-network
    depends_on:
      - backend
    command: npm run dev -- --host

# Volumes persistentes
volumes:
  postgres_data:
    driver: local
    name: clockwork-postgres-data
  backend_logs:
    driver: local
    name: clockwork-backend-logs

# networks
networks:
  clockwork-network:
    driver: bridge
    name: clockwork-network
