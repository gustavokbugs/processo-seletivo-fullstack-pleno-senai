version: '3.8'

services:
  # container para o postgres
  db:
    image: postgres:15-alpine
    container_name: clockwork-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clockwork
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clockwork-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clockwork"]
      interval: 10s
      timeout: 5s
      retries: 5

  # container para o backend (Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clockwork-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/clockwork?schema=public"
      JWT_SECRET: fiesc_2024_super_secret_jwt_key_change_in_production
      JWT_EXPIRES_IN: 8h
      TZ: America/Sao_Paulo
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - clockwork-network
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run dev"

  # container para o frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clockwork-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
      NODE_ENV: development
      TZ: America/Sao_Paulo
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - clockwork-network
    depends_on:
      - backend
    command: npm run dev -- --host

# Volumes persistentes
volumes:
  postgres_data:
    driver: local
    name: clockwork-postgres-data

# networks
networks:
  clockwork-network:
    driver: bridge
    name: clockwork-network
